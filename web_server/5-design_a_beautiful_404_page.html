<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
            color: #333;
        }
        h1 {
            font-size: 80px;
            margin-bottom: 0;
        }
        h2 {
            font-size: 24px;
            margin-top: 0;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        a {
            color: #007BFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .container {
            background: #fff;
            padding: 50px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        img {
            width: 200px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oups! Page not found.</h2>
        <p>Ceci n'est pas une page</p>
        <img src="https://http.cat/404" alt="404 illustration">
        <p>Return to <a href="/">home</a></p>
    </div>
</body>
</html>
